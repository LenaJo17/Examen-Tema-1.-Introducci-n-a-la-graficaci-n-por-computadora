<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flor Vitral - Canvas App</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="assets/img/favicon.png">

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS personalizado -->
<link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">
    <span class="navbar-brand">Flor Vitral - Canvas</span>
    <span class="navbar-text text-light">
      Jolette Ochoa
    </span>
  </div>
</nav>

<!-- CONTENIDO -->
<div class="container my-5">
  <div class="row g-4">

    <!-- IZQUIERDA - CANVAS -->
    <div class="col-md-6">
      <div class="card shadow-lg p-3">
        <h5 class="text-center mb-3">Imagen Dibujada (Canvas)</h5>
        <canvas id="canvas" width="500" height="600"></canvas>
      </div>
    </div>

    <!-- DERECHA - IMAGEN ORIGINAL -->
    <div class="col-md-6">
      <div class="card shadow-lg p-3">
        <h5 class="text-center mb-3">Imagen Original</h5>
        <img src="assets/img/imagen.jpg" class="img-fluid rounded" alt="Imagen original">
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-3 mt-5">
  <p class="mb-0">Aplicación desarrollada por Jolette Ochoa | Canvas API | 2026</p>
</footer>

<script src="assets/js/main.js"></script>
</body>
</html>
