<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CodeOrca | Canvas API</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🐬 CodeOrca Canvas</a>
        <span class="navbar-text text-light">
            HTML5 Canvas API + JavaScript
        </span>
    </div>
</nav>

<!-- ================= CONTENIDO ================= -->
<div class="container my-5">
    <div class="row g-4">

        <!-- LADO IZQUIERDO - CANVAS -->
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-primary text-white text-center">
                    Imagen Dibujada por Programación
                </div>
                <div class="card-body text-center">
                    <canvas id="canvas" width="500" height="500"></canvas>
                </div>
            </div>
        </div>

        <!-- LADO DERECHO - IMAGEN ORIGINAL -->
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-success text-white text-center">
                    Imagen Original
                </div>
                <div class="card-body text-center">
                    <img src="assets/img/imagen.jpg" 
                         class="img-fluid rounded-3" 
                         alt="Imagen original del delfín">
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ================= FOOTER ================= -->
<footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">
        © 2026 CodeOrca App | Desarrollado por Jolette Ochoa
    </p>
</footer>

<script src="assets/js/main.js"></script>
</body>
</html>
